<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedNote AI种草助手 - 从浏览到决策</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rednote: '#FF2741',     /* 核心品牌色 */
                        rednoteDark: '#E0223A', /* 悬停与阴影色 */
                    },
                    fontFamily: {
                        /* 确保在各端设备上中文字体优雅呈现 */
                        sans:,
                    }
                }
            }
        }
    </script>
    
    <style>
        /* 针对 Markdown 内部元素的全局干预 */
        /* 强制表格列平分空间并控制内部字体大小 */
       .prose table {
            width: 100%;
            table-layout: auto;
            font-size: 0.875rem; 
        }
        /* 针对高亮强调用红色的定制 */
       .prose strong {
            color: #FF2741;
        }
    </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen text-gray-800 antialiased selection:bg-rednote selection:text-white">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 py-4 md:py-5 flex items-center justify-center">
            <h1 class="text-xl md:text-2xl font-bold tracking-wide text-rednote flex items-center gap-2">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
                RedNote AI种草助手
            </h1>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-8">
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 md:p-8 mb-8 transition-all hover:shadow-md">
            <label for="userInput" class="block text-sm font-semibold text-gray-700 mb-3">告诉我你的种草需求：</label>
            <textarea id="userInput" rows="3" 
                class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-base focus:ring-2 focus:ring-rednote/20 focus:border-rednote focus:outline-none transition-all resize-none shadow-inner"
                placeholder="比如：东京一日游，预算1000，偏小众路线..."></textarea>
            
            <div class="mt-5 flex flex-col md:flex-row justify-between items-center gap-4">
                <p class="text-xs text-gray-400">💡 提示：描述越具体，对比方案越精准</p>
                <button id="generateBtn" onclick="handleGenerate()" 
                    class="w-full md:w-auto bg-rednote hover:bg-rednoteDark text-white font-medium py-3 px-8 rounded-full transition-all flex justify-center items-center gap-2 shadow-lg shadow-rednote/30 hover:shadow-rednote/40 hover:-translate-y-0.5 active:translate-y-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    生成深度推荐
                </button>
            </div>
        </div>

        <div id="outputContainer" class="hidden space-y-6">
            
            <div id="loadingIndicator" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
                <div class="animate-pulse space-y-6">
                    <div class="h-6 bg-gray-200 rounded w-1/3 mx-auto"></div>
                    <div class="space-y-3">
                        <div class="h-4 bg-gray-100 rounded w-full"></div>
                        <div class="h-4 bg-gray-100 rounded w-5/6"></div>
                        <div class="h-4 bg-gray-100 rounded w-4/6"></div>
                    </div>
                    <div class="h-32 bg-gray-100 rounded-lg w-full mt-6"></div>
                </div>
                <div class="flex justify-center items-center gap-2 mt-8 text-sm text-gray-400">
                    <svg class="animate-spin h-4 w-4 text-rednote" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    AI正在进行多维度产品对齐与对比分析...
                </div>
            </div>

            <div id="resultCard" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 overflow-hidden">
                <div id="markdownOutput" class="prose prose-slate max-w-none 
                    prose-h2:text-rednote prose-h2:border-b prose-h2:pb-2 
                    prose-h3:text-gray-800 prose-a:text-rednote 
                    prose-th:bg-gray-50 prose-th:text-gray-600 prose-td:text-gray-600">
                    </div>
            </div>

            <div id="followUpActions" class="hidden bg-white/50 backdrop-blur-sm rounded-2xl p-5 border border-gray-100 shadow-sm">
                <p class="text-sm font-medium text-gray-600 mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4 text-rednote" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    对当前推荐不满意？一键让AI微调方案：
                </p>
                <div class="flex flex-wrap gap-3">
                    <button onclick="handleFollowUp('预算优化：基于上面的方案，请给我更便宜的平替方案')" class="group bg-white border border-gray-200 hover:border-rednote hover:bg-rednote/5 text-gray-700 text-sm py-2 px-5 rounded-full transition-all shadow-sm">
                        <span class="group-hover:scale-110 inline-block transition-transform">💰</span> 预算优化
                    </button>
                    <button onclick="handleFollowUp('更小众：我不想去网红打卡点或购买爆款，请基于上面的方向推荐更小众冷门的选项')" class="group bg-white border border-gray-200 hover:border-rednote hover:bg-rednote/5 text-gray-700 text-sm py-2 px-5 rounded-full transition-all shadow-sm">
                        <span class="group-hover:scale-110 inline-block transition-transform">🌿</span> 更小众
                    </button>
                    <button onclick="handleFollowUp('更省时间：请帮我大幅压缩行程耗时，或挑选购买门槛最低、最容易买到的商品')" class="group bg-white border border-gray-200 hover:border-rednote hover:bg-rednote/5 text-gray-700 text-sm py-2 px-5 rounded-full transition-all shadow-sm">
                        <span class="group-hover:scale-110 inline-block transition-transform">⏱️</span> 更省时间
                    </button>
                </div>
            </div>
            
        </div>
    </main>

    <script>
        // 本地状态容器：记录该用户的完整会话历史记录
        let conversationHistory =;

        // 绑定事件：首次生成推荐
        async function handleGenerate() {
            const inputEl = document.getElementById("userInput");
            const query = inputEl.value.trim();
            if (!query) {
                alert("请输入您想种草或寻找的内容，再点击生成哦。");
                return;
            }

            // 用户通过输入框发起请求时，重置会话历史，开始全新的上下文
            conversationHistory = [{ role: "user", content: query }];
            await executeAPIRequest();
        }

        // 绑定事件：快捷追问按钮
        async function handleFollowUp(promptString) {
            // 向现有的会话历史追加追问请求，大模型将以此推断上下文
            conversationHistory.push({ role: "user", content: promptString });
            
            // 为了更好的用户体验，将按钮点击转化后的具体指令显示在输入框内
            document.getElementById("userInput").value = promptString;
            
            await executeAPIRequest();
        }

        // 核心调度函数：控制网络请求、UI状态切换及Markdown安全渲染
        async function executeAPIRequest() {
            const outputContainer = document.getElementById("outputContainer");
            const loadingIndicator = document.getElementById("loadingIndicator");
            const resultCard = document.getElementById("resultCard");
            const markdownOutput = document.getElementById("markdownOutput");
            const followUpActions = document.getElementById("followUpActions");
            const generateBtn = document.getElementById("generateBtn");

            // 1. 状态装载：进入Loading流
            outputContainer.classList.remove("hidden");
            loadingIndicator.classList.remove("hidden");
            resultCard.classList.add("hidden");
            followUpActions.classList.add("hidden");
            
            // 锁定主按钮防止重复点击导致并发问题
            generateBtn.disabled = true;
            generateBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 思考中...`;
            generateBtn.classList.add("opacity-80", "cursor-wait");

            try {
                // 2. 发起跨域或同源API调用（调用我们配置的 Vercel Serverless Function）
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                if (!res.ok) throw new Error("API 请求遇到网络或授权阻碍。");

                const data = await res.json();
                const aiResponseText = data.result;

                // 将助手的回答也存入会话记录中，形成完整的闭环对话逻辑
                conversationHistory.push({ role: "assistant", content: aiResponseText });

                // 3. 渲染管道：从文本到安全的富文本UI
                // 步骤A：将Markdown翻译为HTML字符串
                const rawHtml = marked.parse(aiResponseText);
                
                // 步骤B：对生成的HTML进行严苛的过滤消毒，斩断XSS攻击向量
                const cleanHtml = DOMPurify.sanitize(rawHtml);
                
                // 步骤C：布局修正。将裸露的<table>包裹在响应式容器内，防止撑破移动端屏幕
                const responsiveHtml = cleanHtml.replace(/<table/g, '<div class="overflow-x-auto my-6 shadow-sm border border-gray-100 rounded-lg"><table class="w-full text-left border-collapse"').replace(/<\/table>/g, '</table></div>');

                // 最终挂载至真实DOM树
                markdownOutput.innerHTML = responsiveHtml;

                // 4. 状态恢复：显示最终成果
                loadingIndicator.classList.add("hidden");
                resultCard.classList.remove("hidden");
                followUpActions.classList.remove("hidden");

                // 平滑滚屏以使用户视线聚焦于生成结果
                resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                console.error("生成失败异常捕获:", error);
                markdownOutput.innerHTML = `<div class="bg-red-50 text-rednote p-4 rounded-lg flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 哎呀，网络波动或服务过载，请稍后再试～</div>`;
                loadingIndicator.classList.add("hidden");
                resultCard.classList.remove("hidden");
            } finally {
                // 解锁主操作区
                generateBtn.disabled = false;
                generateBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> 生成深度推荐`;
                generateBtn.classList.remove("opacity-80", "cursor-wait");
            }
        }
    </script>
</body>
</html>
